//The traffic sign shape (主交通标志的形状)
enum BstdsTrafficSignShape {
    TFS_SHAPE_UNKNOWN = 0;
    TFS_CIRCLE = 1;
    TFS_RECTANGLE = 2;
    TFS_TRIANGLE = 3;
    TFS_INVTRIANGLE = 4;
    TFS_DIAMOND = 5;
    TFS_PENTANGLE = 6;
};

message BstdsTrfcSignHeader {
    optional int32 protocol_version = 1; 
    optional double time_stamp = 2;
    optional double isp_time_stamp = 3;
    optional int32 traffic_sign_num = 4;   
    optional int64 check_sum = 5;
    optional int32 cntr = 6;
};

message BstdsTrfcSignObj {
    //用于表征目标追踪；1000ms 内同一个 Id 不能被复用
    optional int32 id = 1;
    //if supp tsr and main tsr are related, they share the same group id
    optional int32 group_id = 2;   
    //The confidence value used by the functions to determine if the quality of the traffic sign information is good enough to use.
    //（交通标志识别的置信度）
    optional float confidence = 3; 
    //The lateral position of a traffic sign. 3D position of main sign (center), unit:meter (距离交通标志的横向距离)
    optional float lat_pos = 4; 
    //The variance for the traffic sign lateral position (横向距离方差)
    optional float lat_pos_variance = 5; 
    //The longitudinal position of a road sign, unit:meter (距离标志的纵向距离)
    optional float long_pos = 6;
    //The variance for the traffic sign longitudinal position (纵向距离方差)
    optional float long_pos_variance = 7; 
    //The vertical position of a traffic sign. 3D position of main sign (center), unit:meter （距离交通标志的垂向距离）
    optional float vert_pos = 8;
    //The variance for the traffic sign vertical position (垂向距离方差)
    optional float vert_pos_variance = 9; 
    //The width of the traffic sign, unit:meter (交通标志的宽度。当为矩形时，应为矩形的宽；当为圆形时，应为圆的直径。当为三角形时，应为三角形底边的长度)
    optional float width = 10;
    //The height of the traffic sign, unit:meter (交通标志的高度。当为矩形时，应为矩形的高；当为圆形时，应为圆的直径；当为三角形时，应为顶点到底边的距离)
    optional float height = 11;
    optional int32 main_type = 12; 
    optional int32 sub_type_1 = 13;
    optional int32 sub_type_2 = 14; 
    optional BstdsTrafficSignShape shape = 15;  
    optional float tsr_sign_value = 16;
    optional float vert_angle_bot = 17;
    optional float vert_angle_top = 18;
    optional float hozl_angle_left = 19;
    optional float hozl_angle_right = 20;
    optional int32 bbox_left = 21; 
    optional int32 bbox_right = 22; 
    optional int32 bbox_top = 23; 
    optional int32 bbox_bottom = 24; 
    optional BstdsBoolean is_near_hozl_edge = 25;
    optional BstdsBoolean is_near_vert_edge = 26;
    optional float curbside_distance = 27;
};

message BstdsTrfcSignInfo {
    optional BstdsTrfcSignHeader header = 1;
    repeated BstdsTrfcSignObj trfc_sign = 2;
};
